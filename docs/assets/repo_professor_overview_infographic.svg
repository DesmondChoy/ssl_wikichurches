<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1280" viewBox="0 0 1800 1280" role="img" aria-labelledby="title desc">
  <title id="title">ssl_wikichurches professor overview infographic</title>
  <desc id="desc">High-level infographic describing the purpose, implemented pipeline, and research-question coverage of the ssl_wikichurches repository.</desc>
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbfaf5"/>
      <stop offset="100%" stop-color="#f3efe5"/>
    </linearGradient>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="50%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <pattern id="dotPattern" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="1.4" fill="#d9d3c5"/>
    </pattern>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b9199"/>
    </marker>
    <style>
      .eyebrow { font: 700 18px 'Avenir Next', 'Segoe UI', sans-serif; letter-spacing: 0.18em; fill: #0f766e; text-transform: uppercase; }
      .title { font: 800 48px 'Avenir Next', 'Segoe UI', sans-serif; fill: #111827; }
      .subtitle { font: 500 20px 'Avenir Next', 'Segoe UI', sans-serif; fill: #475569; }
      .section { font: 700 20px 'Avenir Next', 'Segoe UI', sans-serif; fill: #0f172a; letter-spacing: 0.03em; }
      .cardTitle { font: 700 24px 'Avenir Next', 'Segoe UI', sans-serif; fill: #0f172a; }
      .cardTitleSm { font: 700 22px 'Avenir Next', 'Segoe UI', sans-serif; fill: #0f172a; }
      .cardBody { font: 500 18px 'Avenir Next', 'Segoe UI', sans-serif; fill: #334155; }
      .cardBodySm { font: 500 16px 'Avenir Next', 'Segoe UI', sans-serif; fill: #334155; }
      .small { font: 600 16px 'Avenir Next', 'Segoe UI', sans-serif; fill: #64748b; }
      .pill { font: 700 16px 'Avenir Next', 'Segoe UI', sans-serif; fill: #0f172a; }
      .metric { font: 700 15px 'Avenir Next', 'Segoe UI', sans-serif; fill: #0f172a; }
      .number { font: 800 18px 'Avenir Next', 'Segoe UI', sans-serif; fill: #ffffff; }
      .mono { font: 600 16px 'SFMono-Regular', 'Menlo', monospace; fill: #1e293b; }
      .footer { font: 600 16px 'Avenir Next', 'Segoe UI', sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="1800" height="1280" fill="url(#bgGradient)"/>
  <rect width="1800" height="1280" fill="url(#dotPattern)" opacity="0.36"/>
  <circle cx="160" cy="120" r="120" fill="#d9f2ef" opacity="0.85"/>
  <circle cx="1650" cy="146" r="140" fill="#fde7d7" opacity="0.72"/>
  <circle cx="1510" cy="1080" r="170" fill="#dbeafe" opacity="0.42"/>

  <rect x="34" y="24" width="1732" height="1230" rx="34" fill="#fffdf9" stroke="#e7dfcf" stroke-width="2"/>
  <rect x="60" y="58" width="1680" height="8" rx="4" fill="url(#heroGradient)"/>

  <text x="90" y="126" class="eyebrow">Repo Overview</text>
  <text x="90" y="184" class="title">ssl_wikichurches: professor-facing repo overview</text>
  <text x="90" y="224" class="subtitle">
    <tspan x="90" dy="0">What has been implemented: a full stack for attention alignment on WikiChurches.</tspan>
    <tspan x="90" dy="28">Why it exists and how it is addressed: expert annotations, model comparison, fine-tuning, and interactive analysis.</tspan>
  </text>

  <g transform="translate(90 258)">
    <rect x="0" y="0" width="180" height="42" rx="21" fill="#dcfce7" stroke="#86efac"/>
    <text x="90" y="27" class="pill" text-anchor="middle">Core infra implemented</text>

    <rect x="198" y="0" width="176" height="42" rx="21" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="286" y="27" class="pill" text-anchor="middle">Data pipeline implemented</text>

    <rect x="392" y="0" width="164" height="42" rx="21" fill="#fef3c7" stroke="#fcd34d"/>
    <text x="474" y="27" class="pill" text-anchor="middle">Metrics implemented</text>

    <rect x="574" y="0" width="194" height="42" rx="21" fill="#ede9fe" stroke="#c4b5fd"/>
    <text x="671" y="27" class="pill" text-anchor="middle">Visualization implemented</text>

    <rect x="786" y="0" width="216" height="42" rx="21" fill="#cffafe" stroke="#67e8f9"/>
    <text x="894" y="27" class="pill" text-anchor="middle">Interactive app implemented</text>

    <rect x="1020" y="0" width="210" height="42" rx="21" fill="#fee2e2" stroke="#fda4af"/>
    <text x="1125" y="27" class="pill" text-anchor="middle">Fine-tuning core implemented</text>
  </g>

  <text x="90" y="352" class="section">1. Purpose and study scope</text>

  <g filter="url(#cardShadow)">
    <rect x="90" y="376" width="520" height="228" rx="26" fill="#f4fbfa" stroke="#98d7cd"/>
    <text x="120" y="418" class="cardTitle">Purpose of the repo</text>
    <text x="120" y="456" class="cardBody">
      <tspan x="120" dy="0">- Move beyond accuracy-only evaluation.</tspan>
      <tspan x="120" dy="30">- Quantify whether model attention overlaps with</tspan>
      <tspan x="120" dy="28">  expert-marked architectural evidence.</tspan>
      <tspan x="120" dy="30">- Keep the full loop in one place: dataset parsing,</tspan>
      <tspan x="120" dy="28">  attention extraction, metrics, fine-tuning, and UI.</tspan>
    </text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="640" y="376" width="520" height="228" rx="26" fill="#f8f7fe" stroke="#c7c3f8"/>
    <text x="670" y="418" class="cardTitle">Research questions addressed</text>
    <text x="670" y="456" class="cardBody">
      <tspan x="670" dy="0">- Q1: How well do frozen models align with expert boxes?</tspan>
      <tspan x="670" dy="30">- Q2: Do linear probe, LoRA, or full fine-tuning shift</tspan>
      <tspan x="670" dy="28">  attention toward or away from expert features?</tspan>
      <tspan x="670" dy="30">- Q3: Which individual attention heads align best with</tspan>
      <tspan x="670" dy="28">  specific architectural features?</tspan>
    </text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="1190" y="376" width="550" height="228" rx="26" fill="#fff9f3" stroke="#f0c899"/>
    <text x="1220" y="418" class="cardTitle">Study scope grounded in the repo</text>
    <text x="1220" y="456" class="cardBody">
      <tspan x="1220" dy="0">- WikiChurches source set: 9,485 images</tspan>
      <tspan x="1220" dy="30">- Annotated evaluation pool: 139 images</tspan>
      <tspan x="1220" dy="30">- Expert evidence: 631 bounding boxes across</tspan>
      <tspan x="1220" dy="28">  4 styles and 106 feature labels</tspan>
      <tspan x="1220" dy="30">- Model surface: 7 backbones, 4 attention methods,</tspan>
      <tspan x="1220" dy="28">  5 alignment metrics, 3 fine-tuning strategies</tspan>
    </text>
  </g>

  <text x="90" y="674" class="section">2. How the repo addresses the problem</text>

  <line x1="325" y1="765" x2="395" y2="765" stroke="#8b9199" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="605" y1="765" x2="675" y2="765" stroke="#8b9199" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="885" y1="765" x2="955" y2="765" stroke="#8b9199" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1165" y1="765" x2="1235" y2="765" stroke="#8b9199" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1445" y1="765" x2="1515" y2="765" stroke="#8b9199" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#cardShadow)">
    <rect x="90" y="700" width="235" height="220" rx="24" fill="#ffffff" stroke="#c7ddd8"/>
    <circle cx="126" cy="740" r="22" fill="#0f766e"/>
    <text x="126" y="746" class="number" text-anchor="middle">1</text>
    <text x="160" y="744" class="cardTitleSm">Annotated data</text>
    <text x="116" y="784" class="cardBodySm">
      <tspan x="116" dy="0">AnnotatedSubset and bbox parsers</tspan>
      <tspan x="116" dy="24">turn expert JSON annotations into</tspan>
      <tspan x="116" dy="24">masks, metadata, and evaluation</tspan>
      <tspan x="116" dy="24">records for the 139-image holdout.</tspan>
    </text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="370" y="700" width="235" height="220" rx="24" fill="#ffffff" stroke="#c9d6f7"/>
    <circle cx="406" cy="740" r="22" fill="#1d4ed8"/>
    <text x="406" y="746" class="number" text-anchor="middle">2</text>
    <text x="440" y="744" class="cardTitleSm">Model stack</text>
    <text x="396" y="784" class="cardBodySm">
      <tspan x="396" dy="0">Wrappers cover DINOv2, DINOv3,</tspan>
      <tspan x="396" dy="24">MAE, CLIP, SigLIP, SigLIP 2,</tspan>
      <tspan x="396" dy="24">plus a supervised ResNet-50</tspan>
      <tspan x="396" dy="24">baseline under one surface.</tspan>
    </text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="650" y="700" width="235" height="220" rx="24" fill="#ffffff" stroke="#e5d09f"/>
    <circle cx="686" cy="740" r="22" fill="#c2410c"/>
    <text x="686" y="746" class="number" text-anchor="middle">3</text>
    <text x="720" y="744" class="cardTitleSm">Attention methods</text>
    <text x="676" y="784" class="cardBodySm">
      <tspan x="676" dy="0">Repo logic extracts model-specific</tspan>
      <tspan x="676" dy="24">attention with cls, rollout, mean,</tspan>
      <tspan x="676" dy="24">or gradcam, then upsamples</tspan>
      <tspan x="676" dy="24">results into image-space heatmaps.</tspan>
    </text>
    <rect x="676" y="876" width="52" height="24" rx="12" fill="#fff4df" stroke="#f0c899"/>
    <text x="702" y="893" class="metric" text-anchor="middle">cls</text>
    <rect x="736" y="876" width="78" height="24" rx="12" fill="#fff4df" stroke="#f0c899"/>
    <text x="775" y="893" class="metric" text-anchor="middle">rollout</text>
    <rect x="676" y="906" width="58" height="24" rx="12" fill="#fff4df" stroke="#f0c899"/>
    <text x="705" y="923" class="metric" text-anchor="middle">mean</text>
    <rect x="742" y="906" width="90" height="24" rx="12" fill="#fff4df" stroke="#f0c899"/>
    <text x="787" y="923" class="metric" text-anchor="middle">gradcam</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="930" y="700" width="235" height="220" rx="24" fill="#ffffff" stroke="#b9dfcb"/>
    <circle cx="966" cy="740" r="22" fill="#15803d"/>
    <text x="966" y="746" class="number" text-anchor="middle">4</text>
    <text x="1000" y="744" class="cardTitleSm">Metric evaluation</text>
    <text x="956" y="784" class="cardBodySm">
      <tspan x="956" dy="0">Heatmaps are scored against expert</tspan>
      <tspan x="956" dy="24">annotations with discrete overlap</tspan>
      <tspan x="956" dy="24">metrics and threshold-free</tspan>
      <tspan x="956" dy="24">continuous metrics.</tspan>
    </text>
    <rect x="956" y="862" width="54" height="24" rx="12" fill="#e9f9ef" stroke="#86efac"/>
    <text x="983" y="879" class="metric" text-anchor="middle">IoU</text>
    <rect x="1018" y="862" width="92" height="24" rx="12" fill="#e9f9ef" stroke="#86efac"/>
    <text x="1064" y="879" class="metric" text-anchor="middle">Coverage</text>
    <rect x="956" y="894" width="56" height="24" rx="12" fill="#e9f9ef" stroke="#86efac"/>
    <text x="984" y="911" class="metric" text-anchor="middle">MSE</text>
    <rect x="1020" y="894" width="44" height="24" rx="12" fill="#e9f9ef" stroke="#86efac"/>
    <text x="1042" y="911" class="metric" text-anchor="middle">KL</text>
    <rect x="1072" y="894" width="52" height="24" rx="12" fill="#e9f9ef" stroke="#86efac"/>
    <text x="1098" y="911" class="metric" text-anchor="middle">EMD</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="1210" y="700" width="235" height="220" rx="24" fill="#ffffff" stroke="#f0b5b8"/>
    <circle cx="1246" cy="740" r="22" fill="#be123c"/>
    <text x="1246" y="746" class="number" text-anchor="middle">5</text>
    <text x="1280" y="744" class="cardTitleSm">Fine-tuning</text>
    <text x="1236" y="784" class="cardBodySm">
      <tspan x="1236" dy="0">Q2 keeps the annotated images out</tspan>
      <tspan x="1236" dy="24">of the primary train and val split,</tspan>
      <tspan x="1236" dy="24">then re-extracts attention after</tspan>
      <tspan x="1236" dy="24">linear probe, LoRA, or full tuning.</tspan>
    </text>
    <text x="1236" y="898" class="small">Wilcoxon, Holm, Cohen's d</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="1490" y="700" width="235" height="220" rx="24" fill="#ffffff" stroke="#c7d2e5"/>
    <circle cx="1526" cy="740" r="22" fill="#334155"/>
    <text x="1526" y="746" class="number" text-anchor="middle">6</text>
    <text x="1560" y="744" class="cardTitleSm">Analysis UI</text>
    <text x="1516" y="784" class="cardBodySm">
      <tspan x="1516" dy="0">FastAPI plus React expose</tspan>
      <tspan x="1516" dy="24">gallery, image detail, compare,</tspan>
      <tspan x="1516" dy="24">dashboard, a strategy-aware /q2,</tspan>
      <tspan x="1516" dy="24">and an advanced /q3 workspace.</tspan>
    </text>
  </g>

  <text x="90" y="994" class="section">3. What is already implemented in the repo</text>

  <g filter="url(#cardShadow)">
    <rect x="90" y="1020" width="392" height="184" rx="24" fill="#f6fbff" stroke="#b8d7f2"/>
    <text x="120" y="1062" class="cardTitle">Q1: frozen-model alignment</text>
    <text x="120" y="1102" class="cardBodySm">
      <tspan x="120" dy="0">- Model leaderboard and layer progression</tspan>
      <tspan x="120" dy="24">- Style and feature breakdowns</tspan>
      <tspan x="120" dy="24">- Per-image overlays and bbox drill-down</tspan>
      <tspan x="120" dy="24">- API endpoints plus cached artifacts</tspan>
    </text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="512" y="1020" width="392" height="184" rx="24" fill="#fff7fb" stroke="#edbad0"/>
    <text x="542" y="1062" class="cardTitleSm">Q2: fine-tuning attention shift</text>
    <text x="542" y="1102" class="cardBodySm">
      <tspan x="542" dy="0">- Shared-split experiment batches</tspan>
      <tspan x="542" dy="24">- Strategy-aware summary at /q2</tspan>
      <tspan x="542" dy="24">- Frozen vs fine-tuned compare flows</tspan>
      <tspan x="542" dy="24">- Active artifacts in outputs/results</tspan>
    </text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="934" y="1020" width="392" height="184" rx="24" fill="#fffaf1" stroke="#efd4aa"/>
    <text x="964" y="1062" class="cardTitleSm">Q3: head specialization</text>
    <text x="964" y="1102" class="cardBodySm">
      <tspan x="964" dy="0">- Per-head ranking and feature matrix</tspan>
      <tspan x="964" dy="24">- Exemplar retrieval and focus sync</tspan>
      <tspan x="964" dy="24">- Advanced side-by-side /q3 workspace</tspan>
      <tspan x="964" dy="24">- Scoped to cls-path models only</tspan>
    </text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="1356" y="1020" width="384" height="184" rx="24" fill="#f8fafc" stroke="#d4dbe4"/>
    <text x="1386" y="1062" class="cardTitleSm">Repo implementation layers</text>
    <text x="1386" y="1096" class="mono">
      <tspan x="1386" dy="0">src/ssl_attention/</tspan>
      <tspan x="1386" dy="26">app/backend/</tspan>
      <tspan x="1386" dy="26">app/frontend/</tspan>
      <tspan x="1386" dy="26">app/precompute/</tspan>
      <tspan x="1386" dy="26">docs/reference/</tspan>
    </text>
  </g>

  <rect x="90" y="1224" width="1650" height="24" rx="12" fill="#eef2f7" stroke="#d4dbe4"/>
  <text x="915" y="1241" class="footer" text-anchor="middle">Takeaway: this repo already implements the full loop from expert annotations to attention extraction, quantitative evaluation, fine-tuning analysis, and professor-readable interactive inspection.</text>
</svg>
